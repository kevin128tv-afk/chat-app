<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakao Chat Landing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">
    <div class="landing-container">
        <h1>KakaoTalk Web</h1>
        <p>실시간 대화와 소통을 시작해 보세요.</p>
        <div class="landing-buttons">
            <button onclick="location.href='login.html'" class="btn-primary">로그인</button>
            <button onclick="location.href='register.html'" class="btn-secondary">회원가입</button>
        </div>
    </div>
    <script>
        if (localStorage.getItem('token')) {
            window.location.href = 'chat.html';
        }
    </script>
</body>
</html>
