<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채팅룸</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="chat-body">
    <div class="chat-app-container">
        <aside class="sidebar">
            <div class="my-profile">
                <img id="my-avatar" src="" alt="나">
                <span id="my-nickname">나</span>
                <button id="btn-logout">로그아웃</button>
            </div>
            <div class="friend-add-box">
                <input type="text" id="friend-username-input" placeholder="친구 아이디 검색">
                <button id="btn-add-friend">+</button>
            </div>
            <div class="friends-list-container">
                <h3>친구 목록 (<span id="friend-count">0</span>)</h3>
                <ul id="friends-list"></ul>
            </div>
        </aside>
        <main class="chat-area">
            <div id="chat-blank" class="chat-blank">
                <p>대화할 상대를 선택해 주세요.</p>
            </div>
            <div id="chat-window" class="chat-window hide">
                <header class="chat-header">
                    <img id="target-avatar" src="" alt="상대방">
                    <span id="target-nickname">대화 상대</span>
                </header>
                <div id="messages-display" class="messages-display"></div>
                <footer class="chat-footer">
                    <label for="chat-image-input" class="btn-file-label">📁</label>
                    <input type="file" id="chat-image-input" accept="image/*" class="hide">
                    <input type="text" id="chat-text-input" placeholder="메시지를 입력하세요...">
                    <button id="btn-send-message">전송</button>
                </footer>
            </div>
        </main>
    </div>
    <script src="socket.js"></script>
    <script src="chat.js"></script>
</body>
</html>
